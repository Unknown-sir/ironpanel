openapi: 3.0.3
info:
  title: IronPanel API
  version: "13.2"
  description: |
    IronPanel API v1 and v2 documentation for user management, monitoring, billing, nodes, tickets and health details.
servers:
  - url: http://YOUR_PANEL
    description: Replace with your IronPanel domain or IP
security:
  - ApiToken: []
  - ApiKey: []
components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-API-KEY
    ApiToken:
      type: http
      scheme: bearer
      bearerFormat: API Token
    ApiTokenHeader:
      type: apiKey
      in: header
      name: X-API-TOKEN
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: invalid token
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        enabled:
          type: boolean
        access_ok:
          type: boolean
        access_reason:
          type: string
        protocols:
          type: array
          items:
            type: string
            enum: [openvpn, wireguard, ocserv, l2tp]
        data_limit_mb:
          type: integer
          description: 0 means unlimited traffic.
        used_total_mb:
          type: integer
        connection_limit:
          type: integer
        expires_at:
          type: string
          nullable: true
          description: null means unlimited expiration.
    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        days:
          type: integer
          description: 0 means unlimited expiration.
        data_limit_mb:
          type: integer
          description: 0 means unlimited traffic.
        connection_limit:
          type: integer
        protocols:
          type: array
          items:
            type: string
            enum: [openvpn, wireguard, ocserv, l2tp]
        l2tp_password:
          type: string
        cisco_password:
          type: string
    EditUserRequest:
      type: object
      properties:
        enabled:
          type: boolean
        days:
          type: integer
        data_limit_mb:
          type: integer
        connection_limit:
          type: integer
        allowed_devices:
          type: integer
        password:
          type: string
paths:
  /api/status:
    get:
      tags: [API v1]
      summary: Panel and VPN service status
      security:
        - ApiKey: []
      responses:
        '200':
          description: OK
  /api/users/list_all:
    get:
      tags: [API v1]
      summary: List all VPN users
      security:
        - ApiKey: []
      responses:
        '200':
          description: OK
  /api/users/create:
    post:
      tags: [API v1]
      summary: Create VPN user
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: Created
  /api/users/{user_id}/toggle:
    post:
      tags: [API v1]
      summary: Enable or disable user
      security:
        - ApiKey: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
  /api/users/{user_id}:
    delete:
      tags: [API v1]
      summary: Delete user
      security:
        - ApiKey: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
  /api/nodes:
    get:
      tags: [API v1]
      summary: List nodes
      security:
        - ApiKey: []
      responses:
        '200':
          description: OK
  /api/tickets:
    post:
      tags: [API v1]
      summary: Create support ticket
      security:
        - ApiKey: []
      responses:
        '200':
          description: Created
  /api/logs:
    get:
      tags: [API v1]
      summary: Activity logs
      security:
        - ApiKey: []
      responses:
        '200':
          description: OK
  /api/v2/openapi.json:
    get:
      tags: [API v2]
      summary: OpenAPI schema
      responses:
        '200':
          description: OK
  /api/v2/auth/token:
    post:
      tags: [API v2]
      summary: Issue token from admin credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Token issued
  /api/v2/monitoring:
    get:
      tags: [API v2]
      summary: Realtime monitoring metrics and service status
      security:
        - ApiToken: []
        - ApiTokenHeader: []
      responses:
        '200':
          description: OK
  /api/v2/sessions:
    get:
      tags: [API v2]
      summary: Online sessions
      security:
        - ApiToken: []
        - ApiTokenHeader: []
      responses:
        '200':
          description: OK
  /api/v2/users:
    get:
      tags: [API v2]
      summary: List users
      security:
        - ApiToken: []
        - ApiTokenHeader: []
      responses:
        '200':
          description: OK
    post:
      tags: [API v2]
      summary: Create user
      security:
        - ApiToken: []
        - ApiTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: Created
  /api/v2/users/{user_id}:
    patch:
      tags: [API v2]
      summary: Edit user
      security:
        - ApiToken: []
        - ApiTokenHeader: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditUserRequest'
      responses:
        '200':
          description: Updated
    delete:
      tags: [API v2]
      summary: Delete user
      security:
        - ApiToken: []
        - ApiTokenHeader: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
  /api/v2/nodes:
    get:
      tags: [API v2]
      summary: List nodes
      security:
        - ApiToken: []
        - ApiTokenHeader: []
      responses:
        '200':
          description: OK
  /api/v2/plans:
    get:
      tags: [API v2]
      summary: List active plans
      security:
        - ApiToken: []
        - ApiTokenHeader: []
      responses:
        '200':
          description: OK
  /api/v2/invoices:
    post:
      tags: [API v2]
      summary: Create invoice
      security:
        - ApiToken: []
        - ApiTokenHeader: []
      responses:
        '200':
          description: Created
  /api/v2/health/details:
    get:
      tags: [API v2]
      summary: Detailed health status and service errors
      security:
        - ApiToken: []
        - ApiTokenHeader: []
      responses:
        '200':
          description: OK
