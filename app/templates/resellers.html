{% extends 'base.html' %}{% block heading %}نمایندگان{% endblock %}{% block content %}<section class="card"><h3>ایجاد نماینده</h3><form method="post" class="form grid-form"><label>نام کاربری<input name="username" required></label><label>رمز<input name="password" required></label><label>سقف کاربر<input name="user_limit" type="number" value="0"></label><label>سقف ترافیک GB<input name="traffic_quota_gb" type="number" value="0"></label><label>مسیر اختصاصی پنل<input name="panel_path" placeholder="reseller-a"></label><button>ایجاد</button></form></section><section class="card"><table><tr><th>نام</th><th>کاربر مجاز</th><th>ترافیک</th><th>API</th></tr>{% for r in resellers %}<tr><td>{{r.username}}</td><td>{{r.user_limit}}</td><td>{{r.traffic_quota_gb}} GB</td><td><code>{{r.api_key}}</code></td></tr>{% endfor %}</table></section>{% endblock %}
