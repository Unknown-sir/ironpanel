{% extends 'base.html' %}{% block heading %}مانیتورینگ پیشرفته{% endblock %}{% block content %}<div class="grid cards"><div class="card"><h3>CPU</h3><b id="cpu">{{metrics.cpu}}%</b></div><div class="card"><h3>RAM</h3><b id="ram">{{metrics.ram.percent}}%</b></div><div class="card"><h3>Disk</h3><b id="disk">{{metrics.disk.percent}}%</b></div><div class="card"><h3>Online</h3><b id="online">{{sessions|length}}</b></div></div><div class="card"><h3>Services</h3><table>{% for k,v in services.items() %}<tr><td>{{k}}</td><td>{{v}}</td></tr>{% endfor %}</table></div><script>setInterval(async()=>{let r=await fetch('/api/v10/metrics');let j=await r.json();cpu.textContent=j.cpu+'%';ram.textContent=j.ram.percent+'%';disk.textContent=j.disk.percent+'%';online.textContent=j.online_users},3000)</script>{% endblock %}
