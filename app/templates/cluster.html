{% extends 'base.html' %}{% block heading %}Cluster / HA / Load Balancer{% endblock %}{% block content %}<div class="grid"><form class="card" method="post"><h3>افزودن Node</h3><input name="name" placeholder="Name"><input name="host" placeholder="Host/IP"><label><input type="checkbox" name="protocols" value="openvpn" checked> OpenVPN</label><label><input type="checkbox" name="protocols" value="wireguard" checked> WireGuard</label><label><input type="checkbox" name="protocols" value="ocserv" checked> Ocserv</label><label><input type="checkbox" name="protocols" value="l2tp" checked> L2TP</label><button>Save</button></form><div class="card"><h3>Remote Commands</h3><form method="post"><select name="node_id"><option value="0">Local</option>{% for n in nodes %}<option value="{{n.id}}">{{n.name}}</option>{% endfor %}</select><select name="action"><option value="restart_vpn">Restart VPN</option><option value="restart_panel">Restart Panel</option><option value="repair">Repair</option><option value="backup">Backup</option><option value="update">Update</option></select><button>Run</button></form></div></div><div class="card"><h3>Jobs</h3><table>{% for j in jobs %}<tr><td>{{j.id}}</td><td>{{j.action}}</td><td>{{j.status}}</td><td>{{j.created_at}}</td></tr>{% endfor %}</table></div>{% endblock %}
