{% extends 'base.html' %}{% block heading %}API v2 Tokens{% endblock %}{% block content %}<form class="card" method="post"><input name="name" placeholder="Token name"><input name="scopes" value="users:read,users:write"><button>Create</button></form><div class="card"><table>{% for t in tokens %}<tr><td>{{t.name}}</td><td><code>{{t.token}}</code></td><td>{{t.scopes}}</td><td>{{t.enabled}}</td></tr>{% endfor %}</table><p>OpenAPI: <code>/api/v2/openapi.json</code></p></div>{% endblock %}
