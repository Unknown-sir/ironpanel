{% extends 'base.html' %}{% block heading %}DNS Manager{% endblock %}{% block content %}<form class="card" method="post"><input name="name" placeholder="Profile name"><input name="primary_dns" placeholder="Primary DNS"><input name="secondary_dns" placeholder="Secondary DNS"><button>Add</button></form><div class="card"><table>{% for p in profiles %}<tr><td>{{p.name}}</td><td>{{p.primary_dns}}</td><td>{{p.secondary_dns}}</td><td>{% if p.is_default %}Default{% else %}<form method="post"><input type="hidden" name="profile_id" value="{{p.id}}"><button name="set_default" value="1">Set default</button></form>{% endif %}</td></tr>{% endfor %}</table></div>{% endblock %}
