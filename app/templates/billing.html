{% extends 'base.html' %}{% block heading %}Billing / Invoices{% endblock %}{% block content %}<form class="card" method="post"><select name="user_id"><option value="">No user</option>{% for u in users %}<option value="{{u.id}}">{{u.username}}</option>{% endfor %}</select><input name="amount" placeholder="Amount"><input name="currency" value="USD"><select name="status"><option>unpaid</option><option>paid</option><option>cancelled</option></select><input name="description" placeholder="Description"><button>Create invoice</button></form><div class="card"><table>{% for i in invoices %}<tr><td>#{{i.id}}</td><td>{{i.amount}} {{i.currency}}</td><td>{{i.status}}</td><td>{{i.description}}</td></tr>{% endfor %}</table></div>{% endblock %}
