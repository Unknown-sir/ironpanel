{% extends 'base.html' %}{% block heading %}Security Center{% endblock %}{% block content %}<form class="card" method="post"><label>2FA <select name="security_2fa_enabled"><option value="0">Disabled</option><option value="1" {% if settings.get('security_2fa_enabled')=='1' %}selected{% endif %}>Enabled</option></select></label><label>CAPTCHA <select name="security_captcha_enabled"><option value="0">Disabled</option><option value="1" {% if settings.get('security_captcha_enabled')=='1' %}selected{% endif %}>Enabled</option></select></label><label>Fail2Ban <select name="fail2ban_enabled"><option value="0">Disabled</option><option value="1" {% if settings.get('fail2ban_enabled')=='1' %}selected{% endif %}>Enabled</option></select></label><textarea name="security_ip_whitelist" placeholder="Allowed admin IPs, one per line">{{settings.get('security_ip_whitelist','')}}</textarea><button>Save</button></form>{% endblock %}
