{% extends 'base.html' %}{% block heading %}تنظیمات سیستم{% endblock %}{% block content %}
<section class="card"><h3>لایسنس</h3><p class="hint">وضعیت: <b class="{{'ok-text' if license_status.valid else 'danger-text'}}">{{license_status.reason}}</b></p><form method="post" class="form grid-form"><input type="hidden" name="form_section" value="license"><label>License Server URL<input value="http://license.skyshield.space:8002" disabled></label><label>License Key<input name="license_key" value="{{settings.get('license_key','')}}"></label><button>ذخیره و بررسی لایسنس</button></form></section>
<section class="card"><h3>تنظیمات اتصال و پروتکل‌ها</h3><form method="post" class="form grid-form"><input type="hidden" name="form_section" value="system">
<label>نام کاربری مدیر<input name="admin_username" value="{{current_user.username}}"></label><label>رمز جدید مدیر<input name="admin_password" type="password" placeholder="خالی = بدون تغییر"></label>
<label>هاست عمومی<input name="public_host" value="{{settings.get('public_host','')}}"></label><label>آدرس تانل برای کانفیگ‌ها<input name="tunnel_host" value="{{settings.get('tunnel_host','')}}"></label><label>پروتکل‌های فعال<input name="active_protocols" value="{{settings.get('active_protocols','openvpn,ocserv,l2tp,wireguard,xray')}}" placeholder="openvpn,ocserv,l2tp,wireguard,xray"></label>
<label>OpenVPN Transport<select name="openvpn_transport"><option value="udp" {{'selected' if openvpn_transport=='udp' else ''}}>UDP</option><option value="tcp" {{'selected' if openvpn_transport=='tcp' else ''}}>TCP</option></select></label>
<label>Ocserv/AnyConnect Transport<select name="ocserv_transport"><option value="tcp_udp" {{'selected' if ocserv_transport=='tcp_udp' else ''}}>TCP + UDP</option><option value="tcp" {{'selected' if ocserv_transport=='tcp' else ''}}>TCP فقط</option><option value="udp" {{'selected' if ocserv_transport=='udp' else ''}}>UDP/DTLS</option></select></label>
<label>WireGuard Transport<select name="wireguard_transport"><option value="udp" selected>UDP استاندارد</option><option value="tcp" {{'selected' if wireguard_transport=='tcp' else ''}}>TCP درخواست‌شده</option></select><small class="hint">هسته WireGuard به‌صورت استاندارد UDP است.</small></label>
<label>L2TP/IPsec Transport<select name="l2tp_transport"><option value="udp" selected>UDP استاندارد</option><option value="tcp" {{'selected' if l2tp_transport=='tcp' else ''}}>TCP درخواست‌شده</option></select><small class="hint">L2TP/IPsec استاندارد روی UDP 500/4500/1701 است.</small></label>
<label>پورت پنل<input name="port_panel" type="number" value="{{ports.panel}}"></label><label>OpenVPN UDP<input name="port_openvpn_udp" type="number" value="{{ports.openvpn_udp}}"></label><label>OpenVPN TCP<input name="port_openvpn_tcp" type="number" value="{{ports.openvpn_tcp}}"></label><label>Ocserv TCP<input name="port_ocserv_tcp" type="number" value="{{ports.ocserv_tcp}}"></label><label>Ocserv UDP<input name="port_ocserv_udp" type="number" value="{{ports.ocserv_udp}}"></label><label>L2TP UDP<input name="port_l2tp_udp" type="number" value="{{ports.l2tp_udp}}"></label><label>IPsec IKE UDP<input name="port_ipsec_ike" type="number" value="{{ports.ipsec_ike}}"></label><label>IPsec NAT-T UDP<input name="port_ipsec_nat" type="number" value="{{ports.ipsec_nat}}"></label><label>WireGuard UDP<input name="port_wireguard_udp" type="number" value="{{ports.wireguard_udp}}"></label><label>Xray TCP<input name="port_xray_tcp" type="number" value="{{ports.xray_tcp}}"></label><label>Xray API Local<input name="port_xray_api" type="number" value="{{ports.xray_api}}"></label>
<label>Telegram Bot Token<input name="telegram_bot_token" value="{{settings.get('telegram_bot_token','')}}"></label><label>Telegram Chat ID<input name="telegram_chat_id" value="{{settings.get('telegram_chat_id','')}}"></label><label>Notify Login<select name="notify_login"><option value="1">فعال</option><option value="0" {{'selected' if settings.get('notify_login')=='0' else ''}}>غیرفعال</option></select></label><label>Notify Expiry<select name="notify_expiry"><option value="1">فعال</option><option value="0" {{'selected' if settings.get('notify_expiry')=='0' else ''}}>غیرفعال</option></select></label><button>ذخیره، بازسازی و ری‌استارت سرویس‌ها</button></form><form method="post" action="/notifications/test"><button class="btn ghost">ارسال پیام تست تلگرام</button></form><p class="hint">بعد از تغییر پورت پنل، سرویس را با <code>sudo bash /opt/ironpanel/upgrade.sh --restart-only</code> ری‌استارت کن.</p></section>
{% endblock %}
