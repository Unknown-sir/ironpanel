<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ورود Ironpanel</title><link rel="stylesheet" href="/static/css/style.css"></head><body class="login-body"><section class="login-card"><div class="brand center"><span class="logo">Fe</span><div><h1>Ironpanel</h1><small>Secure VPN Manager</small></div></div><form method="post" class="form"><label>نام کاربری<input name="username" required autofocus></label><label>رمز عبور<input name="password" type="password" required></label><button>ورود به پنل</button><input name="totp" placeholder="کد ۲FA یا Recovery Code (در صورت فعال بودن)"></form>{% with messages=get_flashed_messages() %}{% for m in messages %}<div class="toast">{{m}}</div>{% endfor %}{% endwith %}</section></body></html>
