<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ironpanel License</title><link rel="stylesheet" href="/static/css/style.css"></head><body class="login-body"><main class="login-card license-lock"><div class="brand center"><span class="logo">Fe</span><div><h1>Ironpanel</h1><small>License Required</small></div></div><h2>پنل نیاز به لایسنس معتبر دارد</h2><p class="hint">{{ license_result.reason }}</p><p class="hint">سرور لایسنس: <code>{{ license_server }}</code></p>{% with messages=get_flashed_messages() %}{% for m in messages %}<div class="toast">{{m}}</div>{% endfor %}{% endwith %}<form method="post" action="/license/update" class="form"><label>ثبت لایسنس جدید<input name="license_key" value="{{license_key}}" required placeholder="License key"></label><button>بررسی و فعال‌سازی</button></form><a class="btn ghost support" href="https://t.me/unknown_eng" target="_blank">ارتباط با پشتیبانی</a></main></body></html>
