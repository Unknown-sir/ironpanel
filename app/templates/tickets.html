{% extends 'base.html' %}{% block heading %}تیکت‌ها{% endblock %}{% block content %}<section class="card"><h3>تیکت جدید</h3><form method="post" class="form grid-form"><label>موضوع<input name="subject" required></label><label>اولویت<select name="priority"><option>normal</option><option>high</option><option>urgent</option></select></label><label>دپارتمان<input name="department" value="support"></label><label class="wide">متن<textarea name="body" required></textarea></label><button>ثبت</button></form></section><section class="card"><table><tr><th>#</th><th>موضوع</th><th>وضعیت</th><th>اولویت</th><th>تاریخ</th></tr>{% for t in tickets %}<tr><td>{{t.id}}</td><td>{{t.subject}}</td><td><span class="badge">{{t.status}}</span></td><td>{{t.priority}}</td><td>{{t.created_at}}</td></tr>{% endfor %}</table></section>{% endblock %}
