<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Subscription - {{user.username}}</title><link rel="stylesheet" href="/static/css/style.css"></head><body class="public"><main class="public-wrap"><section class="card hero"><div><p class="eyebrow">Ironpanel Subscription</p><h1>{{user.username}}</h1><p>هاست اتصال: <b>{{host}}</b></p></div><span class="badge {{'ok' if user.enabled else 'off'}}">{{'فعال' if user.enabled else 'غیرفعال'}}</span></section><section class="config-grid">{% for name, body in configs.items() %}<article class="card config-card"><div class="config-head"><h3>{{name}}</h3><div><button class="btn small copy" data-copy="cfg{{loop.index}}">کپی</button><a class="btn small ghost" href="/profiles/{{user.username}}/{{name}}">دانلود</a></div></div><pre id="cfg{{loop.index}}">{{body}}</pre></article>{% endfor %}</section></main><script src="/static/js/app.js"></script></body></html>
