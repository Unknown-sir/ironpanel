{% extends 'base.html' %}
{% block heading %}حساب من{% endblock %}
{% block content %}
<section class="card hero-card">
  <div>
    <p class="eyebrow">ACCOUNT SECURITY</p>
    <h3>تغییر نام کاربری و رمز عبور</h3>
    <p class="muted">ادمین اصلی و نماینده‌ها می‌توانند از این صفحه اطلاعات ورود خودشان را تغییر دهند. برای امنیت، وارد کردن رمز فعلی الزامی است.</p>
  </div>
  <div class="hero-actions"><span class="badge ok">{{ current_user.role }}</span></div>
</section>
<section class="card account-card">
  <form method="post" class="form grid-form">
    <label>نام کاربری جدید<input name="username" value="{{ current_user.username }}" required minlength="3"></label>
    <label>رمز فعلی<input name="current_password" type="password" required autocomplete="current-password"></label>
    <label>رمز جدید<input name="new_password" type="password" minlength="8" autocomplete="new-password" placeholder="خالی یعنی بدون تغییر رمز"></label>
    <label>تکرار رمز جدید<input name="confirm_password" type="password" minlength="8" autocomplete="new-password"></label>
    <button class="wide">ذخیره تغییرات حساب</button>
  </form>
</section>
{% endblock %}
