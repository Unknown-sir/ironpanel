{% extends 'base.html' %}{% block heading %}Login History{% endblock %}{% block content %}<section class="card"><table><tr><th>کاربر</th><th>IP</th><th>وضعیت</th><th>دلیل</th><th>User-Agent</th><th>زمان</th></tr>{% for r in rows %}<tr><td>{{r.username}}</td><td>{{r.ip}}</td><td><span class="badge {{'ok' if r.success else 'off'}}">{{'موفق' if r.success else 'ناموفق'}}</span></td><td>{{r.reason}}</td><td>{{r.user_agent}}</td><td>{{r.created_at}}</td></tr>{% endfor %}</table></section>{% endblock %}
